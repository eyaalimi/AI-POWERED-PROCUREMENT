[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# E402: module-level import not at top — necessary for sys.path manipulation before imports
# F541: f-string without placeholders — handled separately below
ignore = ["E402"]

# Auto-fix safe rules
fixable = ["F401", "F541", "F601", "W"]

[tool.ruff.lint.per-file-ignores]
# These scripts use sys.path hacks before imports — E402 is intentional
"tests/test_pipeline.py" = ["E402", "F401"]
"tests/test_real_email.py" = ["E402"]
"lambda_handler.py" = ["E402"]
