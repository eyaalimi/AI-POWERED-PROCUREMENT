services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: procurement_db
      POSTGRES_USER: procurement
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    command: uvicorn dashboard.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://procurement:devpassword@db:5432/procurement_db
    volumes:
      - .:/app
    working_dir: /app

volumes:
  pgdata:
