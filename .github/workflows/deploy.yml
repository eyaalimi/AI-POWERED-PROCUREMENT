name: Deploy — Build & Push to Lambda

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 415529767461.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: procurement-agent-prod
  LAMBDA_AGENT: procurement-agent-prod-analysis-agent
  LAMBDA_COLLECTOR: procurement-agent-prod-analysis-agent-offer-collector

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

          # Also tag as latest
          docker tag $IMAGE_URI $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Update Lambda — analysis-agent
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_AGENT \
            --image-uri ${{ steps.build.outputs.image_uri }} \
            --region $AWS_REGION

      - name: Update Lambda — offer-collector
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_COLLECTOR \
            --image-uri ${{ steps.build.outputs.image_uri }} \
            --region $AWS_REGION

      - name: Wait for Lambda updates to complete
        run: |
          aws lambda wait function-updated \
            --function-name $LAMBDA_AGENT \
            --region $AWS_REGION

          aws lambda wait function-updated \
            --function-name $LAMBDA_COLLECTOR \
            --region $AWS_REGION

      - name: Print deployed image
        run: |
          echo "Deployed: ${{ steps.build.outputs.image_uri }}"
          echo "Git SHA : ${{ github.sha }}"

  deploy-dashboard:
    runs-on: ubuntu-latest
    needs: deploy

    env:
      DASHBOARD_ECR: 415529767461.dkr.ecr.us-east-1.amazonaws.com/procurement-agent-prod-dashboard
      LAMBDA_DASHBOARD: procurement-agent-prod-dashboard
      FRONTEND_BUCKET: procurement-agent-prod-frontend-415529767461

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push dashboard API image
        run: |
          docker build --platform linux/amd64 -f Dockerfile.dashboard -t dashboard-api .
          docker tag dashboard-api:latest $DASHBOARD_ECR:latest
          docker push $DASHBOARD_ECR:latest

      - name: Update Dashboard Lambda
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_DASHBOARD \
            --image-uri $DASHBOARD_ECR:latest \
            --region $AWS_REGION
          aws lambda wait function-updated \
            --function-name $LAMBDA_DASHBOARD \
            --region $AWS_REGION

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get API URL
        id: api-url
        run: |
          API_URL=$(aws apigatewayv2 get-apis --region $AWS_REGION \
            --query "Items[?Name=='procurement-agent-prod-dashboard-api'].ApiEndpoint" \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "Dashboard API URL: $API_URL"

      - name: Build & deploy frontend
        run: |
          cd dashboard/frontend
          npm ci
          VITE_API_BASE=${{ steps.api-url.outputs.api_url }}/api npm run build
          aws s3 sync dist/ s3://$FRONTEND_BUCKET/ --delete --cache-control "public, max-age=31536000"
          aws s3 cp dist/index.html s3://$FRONTEND_BUCKET/index.html --cache-control "public, max-age=60"

      - name: Invalidate CloudFront
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items, 'procurement-ai.click')].Id" \
            --output text)
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*" > /dev/null
            echo "CloudFront invalidation created"
          fi
